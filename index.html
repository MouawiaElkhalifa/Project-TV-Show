<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Mouawia Elkhalifa</title>
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <header>
      <div class="search-controls">
        <!-- Search works for BOTH shows and episodes -->
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search shows or episodes..." 
        />

        <!-- Episode filter (hidden in shows view) -->
        <select id="episode-select">
          <option value="">All Episodes</option>
        </select>

        <!-- Counter -->
        <span id="episode-count"></span>

        <!-- REQUIRED for Level 500 -->
        <button id="back-btn" style="display: none;">
          Back to Shows
        </button>
      </div>
    </header>

    <main id="root"></main>

    <footer>
      <p>
        Data provided by
        <a href="https://www.tvmaze.com/" target="_blank">
          TVMaze.com
        </a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
